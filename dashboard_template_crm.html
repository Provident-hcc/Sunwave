// ACTIVITY TRENDS
// ──────────────────────────────────────────────────────────────────
function buildTrends() {
  var actsP = filteredActs();
  var p = FILTERS.period;
  var g = FILTERS.gran || 'day';
  var granLbl = g === 'week' ? 'Weekly' : (g === 'month' ? 'Monthly' : 'Daily');
  var granLblLow = granLbl.toLowerCase();

  // Bucket counts by type
  var daily = {}; var typeSet = {};
  actsP.forEach(function(a){
    var d = pd(a.date); if (!d) return;
    var key = bucketKey(d, g);
    if (!daily[key]) daily[key] = {};
    daily[key][a.type] = (daily[key][a.type]||0)+1;
    typeSet[a.type] = true;
  });
  var days = Object.keys(daily).sort();
  var dayLabelsX = days.map(function(k){ return bucketLabel(k, g); });
  var types = Object.keys(typeSet).sort();
  var typeColors = { Call:'#3b82f6', Note:'#0a3d5c', Email:'#8b5cf6', Sms:'#ec4899', Task:'#3dffc0', Meeting:'#f59e0b', Workflow:'#94a3b8', Wave:'#cbd5e1' };

  var html = '<div class="kpis">';
  html += kpi('navy',  'Activities (' + p + ')', actsP.length);
  html += kpi('blue',  granLbl + ' Avg', days.length ? (actsP.length/days.length).toFixed(1) : '0');
  html += kpi('teal',  'Distinct ' + (g==='month'?'Months':g==='week'?'Weeks':'Days'), days.length);
  html += kpi('amber', 'Distinct Types', types.length);
  html += '</div>';

  html += '<div class="card"><div class="card-h"><div><div class="card-title">' + granLbl + ' Activity by Type</div><div class="card-sub">Stacked area · ' + p + ' · ' + granLblLow + ' buckets</div></div></div>';
  html += '<div class="chart-wrap-tall"><canvas id="ch-daily"></canvas></div></div>';

  // Hour x Day-of-week heatmap
  var grid = []; for (var i=0;i<24;i++){ grid.push([0,0,0,0,0,0,0]); }
  actsP.forEach(function(a){
    var d = pd(a.date); if (!d) return;
    var h = d.getHours(); var dow = d.getDay(); // 0=Sun
    grid[h][dow]++;
  });
  var maxCell = 1; grid.forEach(function(row){ row.forEach(function(v){ if(v>maxCell) maxCell=v; }); });

  var dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var hmHtml = '<div class="hm">';
  hmHtml += '<div></div>';
  dayLabels.forEach(function(l){ hmHtml += '<div class="hm-lbl" style="text-align:center;justify-content:center">'+l+'</div>'; });
  for (var hr=6; hr<23; hr++) {  // 6am - 10pm
    var lbl = hr === 0 ? '12am' : (hr<12?hr+'am':hr===12?'12pm':(hr-12)+'pm');
    hmHtml += '<div class="hm-lbl">'+lbl+'</div>';
    for (var d=0; d<7; d++) {
      var v = grid[hr][d];
      var alpha = maxCell > 0 ? Math.min(1, v/maxCell) : 0;
      var color = 'rgba(10,61,92,' + (alpha * 0.85 + 0.05) + ')';
      var txt = v > 0 ? v : '';
      var fontColor = alpha > 0.5 ? '#fff' : 'var(--text)';
      hmHtml += '<div class="hm-cell" style="background:'+color+';color:'+fontColor+'">'+txt+'</div>';
    }
  }
  hmHtml += '</div>';

  html += '<div class="g2">';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Hour × Day Heatmap</div><div class="card-sub">When activities happen · all hours combined</div></div></div>'+hmHtml+'</div>';

  // Top users time series
  var byUserDaily = {};
  actsP.forEach(function(a){
    if (!a.by) return; var d = pd(a.date); if (!d) return;
    var key = bucketKey(d, g);
    if (!byUserDaily[a.by]) byUserDaily[a.by] = {};
    byUserDaily[a.by][key] = (byUserDaily[a.by][key]||0)+1;
  });
  var topUsers = Object.keys(byUserDaily).map(function(k){ return [k, Object.values(byUserDaily[k]).reduce(function(s,v){return s+v},0)]; })
    .sort(function(a,b){return b[1]-a[1]}).slice(0,6).map(function(x){return x[0]});

  html += '<div class="card"><div class="card-h"><div><div class="card-title">Top 6 Users — ' + granLbl + ' Activity</div><div class="card-sub">Time series · ' + p + ' · ' + granLblLow + ' buckets</div></div></div>';
  html += '<div class="chart-wrap-tall"><canvas id="ch-users"></canvas></div></div></div>';

  document.getElementById('tab-trends').innerHTML = html;

  // Stacked daily chart
  var datasets = types.map(function(t){
    return {
      label: t,
      data: days.map(function(d){ return (daily[d][t]||0); }),
      backgroundColor: typeColors[t] || '#6b7280',
      borderColor: typeColors[t] || '#6b7280',
      fill: true,
    };
  });
  destroyChart('daily');
  CHARTS.daily = new Chart(document.getElementById('ch-daily'), {
    type: 'line',
    data: { labels: dayLabelsX, datasets: datasets },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ stacked:true, beginAtZero:true } },
      plugins: { legend:{position:'top',labels:{font:{size:11}}}, tooltip:{mode:'index',intersect:false} },
      elements: { point:{radius:0} }
    }
  });

  // Top users line chart
  var userColors = ['#0a3d5c','#3dffc0','#3b82f6','#f59e0b','#10b981','#8b5cf6'];
  var userDatasets = topUsers.map(function(u, i){
    return {
      label: u,
      data: days.map(function(d){ return byUserDaily[u][d] || 0; }),
      borderColor: userColors[i],
      backgroundColor: userColors[i] + '33',
      tension: 0.3, fill: false,
    };
  });
  destroyChart('users');
  CHARTS.users = new Chart(document.getElementById('ch-users'), {
    type: 'line',
    data: { labels: dayLabelsX, datasets: userDatasets },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:10} }, y:{ beginAtZero:true } },
      plugins: { legend:{position:'top',labels:{font:{size:11}}} },
      elements: { point:{radius:0} }
    }
  });

  // ── Wave 3/4 — acts/opp · DoW analysis · opp-arrival hour heatmap ────────
  var oppsP_trends = periodOpps();

  // #7 — Activities per Opportunity per period (ratio per bucket)
  var actsPerBucket = {}, oppsPerBucket = {};
  actsP.forEach(function(a){
    var d = pd(a.date); if (!d) return;
    var k = bucketKey(d, g); actsPerBucket[k] = (actsPerBucket[k]||0) + 1;
  });
  oppsP_trends.forEach(function(o){
    var d = pd(o.co); if (!d) return;
    var k = bucketKey(d, g); oppsPerBucket[k] = (oppsPerBucket[k]||0) + 1;
  });
  var apoSet = {};
  Object.keys(actsPerBucket).forEach(function(k){ apoSet[k] = true; });
  Object.keys(oppsPerBucket).forEach(function(k){ apoSet[k] = true; });
  var apoKeys = Object.keys(apoSet).sort();
  var apoLabels = apoKeys.map(function(k){ return bucketLabel(k, g); });
  var apoVals = apoKeys.map(function(k){
    var a = actsPerBucket[k]||0, o = oppsPerBucket[k]||0;
    return o > 0 ? Number((a/o).toFixed(2)) : 0;
  });

  // #20 — Admits by DoW + Conversion by DoW
  var dowAdmits = [0,0,0,0,0,0,0];      // Sun..Sat
  var dowCreated = [0,0,0,0,0,0,0];
  var dowAdmittedFromCreation = [0,0,0,0,0,0,0];
  oppsP_trends.forEach(function(o){
    var dc = pd(o.co);
    if (dc) {
      dowCreated[dc.getDay()]++;
      if (isAdmitted(o)) dowAdmittedFromCreation[dc.getDay()]++;
    }
    if (isAdmitted(o) && o.admit) {
      var da = pd(o.admit); if (da) dowAdmits[da.getDay()]++;
    }
  });
  var dowLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var dowConvRate = dowCreated.map(function(c, i){
    return c > 0 ? Number((dowAdmittedFromCreation[i]/c*100).toFixed(1)) : 0;
  });

  // #21 — Opp arrival by hour-of-day heatmap (same grid as activity heatmap)
  var oppGrid = []; for (var i=0;i<24;i++){ oppGrid.push([0,0,0,0,0,0,0]); }
  oppsP_trends.forEach(function(o){
    var d = pd(o.co); if (!d) return;
    oppGrid[d.getHours()][d.getDay()]++;
  });
  var oppMaxCell = 1; oppGrid.forEach(function(row){ row.forEach(function(v){ if(v>oppMaxCell) oppMaxCell=v; }); });
  var oppHmHtml = '<div class="hm"><div></div>';
  dowLabels.forEach(function(l){ oppHmHtml += '<div class="hm-lbl" style="text-align:center;justify-content:center">'+l+'</div>'; });
  for (var ohr=6; ohr<23; ohr++) {
    var olbl = ohr === 0 ? '12am' : (ohr<12?ohr+'am':ohr===12?'12pm':(ohr-12)+'pm');
    oppHmHtml += '<div class="hm-lbl">'+olbl+'</div>';
    for (var od=0; od<7; od++) {
      var ov = oppGrid[ohr][od];
      var oalpha = oppMaxCell > 0 ? Math.min(1, ov/oppMaxCell) : 0;
      var ocolor = 'rgba(10,61,92,' + (oalpha * 0.85 + 0.05) + ')';
      var otxt = ov > 0 ? ov : '';
      var ofontColor = oalpha > 0.5 ? '#fff' : 'var(--text)';
      oppHmHtml += '<div class="hm-cell" style="background:'+ocolor+';color:'+ofontColor+'">'+otxt+'</div>';
    }
  }
  oppHmHtml += '</div>';

  // Append all Wave 3/4 cards to trends tab
  var w3trend = '<div class="card"><div class="card-h"><div><div class="card-title">Activities per Opportunity</div><div class="card-sub">' + granLbl + ' · acts ÷ opps created per bucket · ' + p + '</div></div></div><div class="chart-wrap-tall"><canvas id="ch-acts-per-opp"></canvas></div></div>';
  w3trend += '<div class="g2">';
  w3trend += '<div class="card"><div class="card-h"><div><div class="card-title">Admits by Day-of-Week</div><div class="card-sub">When admissions land · ' + p + '</div></div></div><div class="chart-wrap"><canvas id="ch-dow-admits"></canvas></div></div>';
  w3trend += '<div class="card"><div class="card-h"><div><div class="card-title">Conversion Rate by Day-of-Week</div><div class="card-sub">% admitted by DoW of creation · ' + p + '</div></div></div><div class="chart-wrap"><canvas id="ch-dow-conv"></canvas></div></div>';
  w3trend += '</div>';
  w3trend += '<div class="card"><div class="card-h"><div><div class="card-title">Opportunity Arrival — Hour × Day</div><div class="card-sub">When new opps come in · ' + p + '</div></div></div>' + oppHmHtml + '</div>';
  document.getElementById('tab-trends').innerHTML += w3trend;

  destroyChart('actsPerOpp');
  CHARTS.actsPerOpp = new Chart(document.getElementById('ch-acts-per-opp'), {
    type:'line',
    data:{ labels: apoLabels, datasets:[{ label:'Acts/Opp', data: apoVals, borderColor:'#0a3d5c', backgroundColor:'rgba(10,61,92,0.15)', tension:0.3, fill:true }] },
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ beginAtZero:true, title:{display:true,text:'acts per opp'} } },
      plugins:{ legend:{display:false} },
      elements:{ point:{radius:2} }
    }
  });

  destroyChart('dowAdmits');
  CHARTS.dowAdmits = new Chart(document.getElementById('ch-dow-admits'), {
    type:'bar',
    data:{ labels: dowLabels, datasets:[{ label:'Admits', data: dowAdmits, backgroundColor:'#10b981', borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{ ticks:{font:{size:11}} }, y:{ beginAtZero:true, title:{display:true,text:'count'} } },
      plugins:{ legend:{display:false} }
    }
  });

  destroyChart('dowConv');
  CHARTS.dowConv = new Chart(document.getElementById('ch-dow-conv'), {
    type:'bar',
    data:{ labels: dowLabels, datasets:[{ label:'Conversion %', data: dowConvRate, backgroundColor:'#3dffc0', borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{ ticks:{font:{size:11}} }, y:{ beginAtZero:true, title:{display:true,text:'%'} } },
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return ctx.parsed.y + '%'; } } } }
    }
  });
}

// ──────────────────────────────────────────────────────────────────
// WAVE 1 — VELOCITY / DISTRIBUTION  (#13, #14, #15, #16)
// ──────────────────────────────────────────────────────────────────
// Shared TTA-style math
function daysBetween(a, b) {
  var da = pd(a), db = pd(b);
  if (!da || !db) return null;
  var diff = (db - da) / 86400000;
  return diff >= 0 ? diff : null;
}
function tta(o) { return daysBetween(o.co, o.admit); }              // Created → Admitted
function tts(o) { return daysBetween(o.co, o.scheduled_date); }     // Created → Scheduled
function tsa(o) { return daysBetween(o.scheduled_date, o.admit); }  // Scheduled → Admitted

// 6-bucket histogram per brief: <1d / 1-3d / 4-7d / 8-14d / 15-30d / 30+d
var VEL_BUCKETS = [
  { label: '<1d',    test: function(d){ return d < 1; } },
  { label: '1-3d',   test: function(d){ return d >= 1 && d <= 3; } },
  { label: '4-7d',   test: function(d){ return d >= 4 && d <= 7; } },
  { label: '8-14d',  test: function(d){ return d >= 8 && d <= 14; } },
  { label: '15-30d', test: function(d){ return d >= 15 && d <= 30; } },
  { label: '30+d',   test: function(d){ return d > 30; } }
];
function bucketize(vals) {
  return VEL_BUCKETS.map(function(b){ return vals.filter(b.test).length; });
}

function buildVelocity() {
  var p = FILTERS.period;
  var g = FILTERS.gran || 'day';
  var granLbl = g === 'week' ? 'Weekly' : (g === 'month' ? 'Monthly' : 'Daily');
  var granLblLow = granLbl.toLowerCase();

  // Outcome + period filtered; bucketing anchored on the relevant date per chart
  var oppsP = periodOpps();

  // #13 — Median Created → Scheduled, trended (bucket by creation date)
  var ttsByBucket = {};
  oppsP.forEach(function(o){
    var d = pd(o.co); if (!d) return;
    var v = tts(o); if (v == null) return;
    var k = bucketKey(d, g);
    if (!ttsByBucket[k]) ttsByBucket[k] = [];
    ttsByBucket[k].push(v);
  });
  var ttsKeys = Object.keys(ttsByBucket).sort();
  var ttsLabels = ttsKeys.map(function(k){ return bucketLabel(k, g); });
  var ttsMeds = ttsKeys.map(function(k){ return Number(median(ttsByBucket[k]).toFixed(1)); });

  // #13b — Per-rep median TTS (≥3 opps floor for fairness)
  var ttsByRep = {};
  oppsP.forEach(function(o){
    var v = tts(o); if (v == null) return;
    var r = o.rep || '(unassigned)';
    if (!ttsByRep[r]) ttsByRep[r] = [];
    ttsByRep[r].push(v);
  });
  var repRows = Object.keys(ttsByRep).map(function(r){
    return { rep: r, med: median(ttsByRep[r]), n: ttsByRep[r].length };
  }).filter(function(x){ return x.n >= 3; })
    .sort(function(a,b){ return a.med - b.med; })
    .slice(0, 12);

  // #14 — Median Scheduled → Admitted, trended (bucket by scheduled date)
  var tsaByBucket = {};
  oppsP.forEach(function(o){
    var d = pd(o.scheduled_date); if (!d) return;
    var v = tsa(o); if (v == null) return;
    var k = bucketKey(d, g);
    if (!tsaByBucket[k]) tsaByBucket[k] = [];
    tsaByBucket[k].push(v);
  });
  var tsaKeys = Object.keys(tsaByBucket).sort();
  var tsaLabels = tsaKeys.map(function(k){ return bucketLabel(k, g); });
  var tsaMeds = tsaKeys.map(function(k){ return Number(median(tsaByBucket[k]).toFixed(1)); });

  // #5 — Median Created → Admitted (TTA), trended (bucket by admit date)
  var ttaByBucket = {};
  oppsP.forEach(function(o){
    var d = pd(o.admit); if (!d) return;
    var v = tta(o); if (v == null) return;
    var k = bucketKey(d, g);
    if (!ttaByBucket[k]) ttaByBucket[k] = [];
    ttaByBucket[k].push(v);
  });
  var ttaTrendKeys = Object.keys(ttaByBucket).sort();
  var ttaTrendLabels = ttaTrendKeys.map(function(k){ return bucketLabel(k, g); });
  var ttaTrendMeds = ttaTrendKeys.map(function(k){ return Number(median(ttaByBucket[k]).toFixed(1)); });

  // #6 — Median First-Touch Time trended (creation → first human activity)
  var ftByBucket = {};
  oppsP.forEach(function(o){
    var c = pd(o.co); if (!c) return;
    var first = firstHumanTouch(o); if (!first) return;
    var hours = (first - c) / 3600000;  // in hours (often <1 day, hours is more meaningful)
    if (hours < 0) return;
    var k = bucketKey(c, g);
    if (!ftByBucket[k]) ftByBucket[k] = [];
    ftByBucket[k].push(hours);
  });
  var ftKeys = Object.keys(ftByBucket).sort();
  var ftLabels = ftKeys.map(function(k){ return bucketLabel(k, g); });
  var ftMeds = ftKeys.map(function(k){ return Number(median(ftByBucket[k]).toFixed(1)); });

  // #19 — Cohort decay: by cohort month, % admitted by day 3/7/14/30
  var cohorts = {};
  filteredOpps().forEach(function(o){
    var c = pd(o.co); if (!c) return;
    var m = c.toISOString().slice(0,7);
    if (!cohorts[m]) cohorts[m] = { size:0, d3:0, d7:0, d14:0, d30:0 };
    cohorts[m].size++;
    if (isAdmitted(o) && o.admit) {
      var days = daysBetween(o.co, o.admit);
      if (days == null) return;
      if (days <= 3)  cohorts[m].d3++;
      if (days <= 7)  cohorts[m].d7++;
      if (days <= 14) cohorts[m].d14++;
      if (days <= 30) cohorts[m].d30++;
    }
  });
  // Last 6 cohorts with size > 0
  var cohortKeys = Object.keys(cohorts).filter(function(k){ return cohorts[k].size > 0; }).sort().slice(-6);
  var cohortLabels = cohortKeys.map(function(k){
    var parts = k.split('-'); var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1],10)-1] + ' ' + parts[0].slice(2);
  });
  function cohortPct(field){
    return cohortKeys.map(function(k){
      var c = cohorts[k]; return c.size > 0 ? Number((c[field]/c.size*100).toFixed(1)) : 0;
    });
  }

  // #15, #16 — Distribution values (period-anchored on creation)
  var ttaVals = oppsP.map(tta).filter(function(v){ return v != null; });
  var ttsVals = oppsP.map(tts).filter(function(v){ return v != null; });
  var tsaVals = oppsP.map(tsa).filter(function(v){ return v != null; });
  var ttaBuckets = bucketize(ttaVals);
  var ttsBucketsHist = bucketize(ttsVals);

  // KPI strip
  var medTts = ttsVals.length ? median(ttsVals).toFixed(1) : '—';
  var medTsa = tsaVals.length ? median(tsaVals).toFixed(1) : '—';
  var medTta = ttaVals.length ? median(ttaVals).toFixed(1) : '—';

  var html = '<div class="kpis">';
  html += kpi('navy',  'Median Created→Sched', medTts + ' d', ttsVals.length + ' opps');
  html += kpi('teal',  'Median Sched→Admit',   medTsa + ' d', tsaVals.length + ' opps');
  html += kpi('blue',  'Median Created→Admit', medTta + ' d', ttaVals.length + ' admits');
  html += kpi('amber', 'Period · Granularity', p + ' · ' + granLbl);
  html += '</div>';

  // Trended pair
  html += '<div class="g2">';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Median Created → Scheduled</div><div class="card-sub">' + granLbl + ' · ' + p + ' · days from creation to scheduled</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-tts"></canvas></div></div>';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Median Scheduled → Admitted</div><div class="card-sub">' + granLbl + ' · ' + p + ' · close lag in days</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-tsa"></canvas></div></div>';
  html += '</div>';

  // Per-rep
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Median Created → Scheduled by Rep</div><div class="card-sub">Fastest first · ' + p + ' · reps with ≥3 opps · top 12</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-tts-rep"></canvas></div></div>';

  // #5 — Median TTA trended (full width, anchors on admit date)
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Median Created → Admitted (TTA)</div><div class="card-sub">' + granLbl + ' · ' + p + ' · bucketed by admit date · ' + ttaTrendKeys.length + ' buckets</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-tta-trend"></canvas></div></div>';

  // #6 — Median First-Touch Time trended
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Median First-Touch Time</div><div class="card-sub">' + granLbl + ' · hours from opp creation to first human activity · ' + p + ' · ' + ftKeys.length + ' buckets</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-first-touch"></canvas></div></div>';

  // #19 — Cohort decay curve
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Cohort Decay — Admit Conversion by Day</div><div class="card-sub">% of opps admitted within 3 / 7 / 14 / 30 days of creation · last 6 monthly cohorts</div></div></div><div class="chart-wrap-tall"><canvas id="ch-vel-cohort"></canvas></div></div>';

  // Histograms
  html += '<div class="g2">';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Time-to-Admit Distribution</div><div class="card-sub">' + p + ' · ' + ttaVals.length + ' opps · days from created to admit</div></div></div><div class="chart-wrap"><canvas id="ch-vel-tta-hist"></canvas></div></div>';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Time-to-Scheduled Distribution</div><div class="card-sub">' + p + ' · ' + ttsVals.length + ' opps · days from created to scheduled</div></div></div><div class="chart-wrap"><canvas id="ch-vel-tts-hist"></canvas></div></div>';
  html += '</div>';

  document.getElementById('tab-velocity').innerHTML = html;

  // ── Chart instances ──
  var dayTooltip = { callbacks: { label: function(ctx){ return ctx.parsed.y + ' days'; } } };
  var dayTooltipX = { callbacks: { label: function(ctx){ return ctx.parsed.x + ' days'; } } };

  destroyChart('velTts');
  CHARTS.velTts = new Chart(document.getElementById('ch-vel-tts'), {
    type: 'line',
    data: { labels: ttsLabels, datasets: [{ label:'Median days', data: ttsMeds, borderColor:'#0a3d5c', backgroundColor:'rgba(10,61,92,0.12)', tension:0.3, fill:true }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ beginAtZero:true, title:{display:true,text:'days'} } },
      plugins: { legend:{display:false}, tooltip:dayTooltip },
      elements: { point:{radius:2} }
    }
  });

  destroyChart('velTsa');
  CHARTS.velTsa = new Chart(document.getElementById('ch-vel-tsa'), {
    type: 'line',
    data: { labels: tsaLabels, datasets: [{ label:'Median days', data: tsaMeds, borderColor:'#3dffc0', backgroundColor:'rgba(61,255,192,0.18)', tension:0.3, fill:true }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ beginAtZero:true, title:{display:true,text:'days'} } },
      plugins: { legend:{display:false}, tooltip:dayTooltip },
      elements: { point:{radius:2} }
    }
  });

  destroyChart('velTtsRep');
  CHARTS.velTtsRep = new Chart(document.getElementById('ch-vel-tts-rep'), {
    type: 'bar',
    data: {
      labels: repRows.map(function(r){ return r.rep + ' (n=' + r.n + ')'; }),
      datasets: [{ label:'Median days', data: repRows.map(function(r){ return Number(r.med.toFixed(1)); }), backgroundColor:'#4BBDE8', borderRadius:4 }]
    },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      scales: { x:{ beginAtZero:true, title:{display:true,text:'days'} }, y:{ ticks:{font:{size:11}} } },
      plugins: { legend:{display:false}, tooltip:dayTooltipX }
    }
  });

  destroyChart('velTtaTrend');
  CHARTS.velTtaTrend = new Chart(document.getElementById('ch-vel-tta-trend'), {
    type: 'line',
    data: { labels: ttaTrendLabels, datasets: [{ label:'Median days', data: ttaTrendMeds, borderColor:'#4BBDE8', backgroundColor:'rgba(75,189,232,0.18)', tension:0.3, fill:true }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ beginAtZero:true, title:{display:true,text:'days'} } },
      plugins: { legend:{display:false}, tooltip:dayTooltip },
      elements: { point:{radius:2} }
    }
  });

  destroyChart('velFirstTouch');
  CHARTS.velFirstTouch = new Chart(document.getElementById('ch-vel-first-touch'), {
    type: 'line',
    data: { labels: ftLabels, datasets: [{ label:'Median hours', data: ftMeds, borderColor:'#3dffc0', backgroundColor:'rgba(61,255,192,0.22)', tension:0.3, fill:true }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ beginAtZero:true, title:{display:true,text:'hours'} } },
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return ctx.parsed.y + ' hours'; } } } },
      elements: { point:{radius:2} }
    }
  });

  destroyChart('velCohort');
  CHARTS.velCohort = new Chart(document.getElementById('ch-vel-cohort'), {
    type:'line',
    data:{
      labels: cohortLabels,
      datasets: [
        { label:'≤3 days',  data: cohortPct('d3'),  borderColor:'#3dffc0', backgroundColor:'rgba(61,255,192,0.15)',  tension:0.3, fill:false },
        { label:'≤7 days',  data: cohortPct('d7'),  borderColor:'#4BBDE8', backgroundColor:'rgba(75,189,232,0.15)',  tension:0.3, fill:false },
        { label:'≤14 days', data: cohortPct('d14'), borderColor:'#0a3d5c', backgroundColor:'rgba(10,61,92,0.15)',    tension:0.3, fill:false },
        { label:'≤30 days', data: cohortPct('d30'), borderColor:'#8b5cf6', backgroundColor:'rgba(139,92,246,0.15)',  tension:0.3, fill:false }
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false,
      scales:{ x:{ ticks:{font:{size:11}} }, y:{ beginAtZero:true, max:100, title:{display:true,text:'% admitted'} } },
      plugins:{ legend:{position:'top',labels:{font:{size:11}}}, tooltip:{mode:'index',intersect:false,callbacks:{label:function(ctx){return ctx.dataset.label + ': ' + ctx.parsed.y + '%';}}} },
      elements:{ point:{radius:3} }
    }
  });

  var bucketLabels = VEL_BUCKETS.map(function(b){ return b.label; });

  destroyChart('velTtaHist');
  CHARTS.velTtaHist = new Chart(document.getElementById('ch-vel-tta-hist'), {
    type: 'bar',
    data: { labels: bucketLabels, datasets: [{ label:'Opps', data: ttaBuckets, backgroundColor:'#0a3d5c', borderRadius:4 }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:11}} }, y:{ beginAtZero:true, title:{display:true,text:'count'} } },
      plugins: { legend:{display:false} }
    }
  });

  destroyChart('velTtsHist');
  CHARTS.velTtsHist = new Chart(document.getElementById('ch-vel-tts-hist'), {
    type: 'bar',
    data: { labels: bucketLabels, datasets: [{ label:'Opps', data: ttsBucketsHist, backgroundColor:'#3dffc0', borderRadius:4 }] },
    options: { responsive:true, maintainAspectRatio:false,
      scales: { x:{ ticks:{font:{size:11}} }, y:{ beginAtZero:true, title:{display:true,text:'count'} } },
      plugins: { legend:{display:false} }
    }
  });
}

// ──────────────────────────────────────────────────────────────────
// COMPOSITION  (#11 referral sources · #22 admit mix · #23 ROI shell)
// ──────────────────────────────────────────────────────────────────
function buildComposition() {
  var p = FILTERS.period;
  var g = FILTERS.gran || 'day';
  var granLbl = g === 'week' ? 'Weekly' : (g === 'month' ? 'Monthly' : 'Daily');
  var oppsP = periodOpps();
  var admits = oppsP.filter(isWonOpp);

  // #11 — Top 5 Referral Sources stacked area (all opps in period, by creation)
  var refTrend  = buildTopNTrended(oppsP,  function(o){ return o.co; }, function(o){ return o.ref; }, g, 5);
  // #22a — Insurance mix on admits (by admit date)
  var insTrend  = buildTopNTrended(admits, function(o){ return o.admit; }, function(o){ return o.ins; }, g, 5);
  // #22b — LOC mix on admits
  var locTrend  = buildTopNTrended(admits, function(o){ return o.admit; }, function(o){ return o.loc; }, g, 5);
  // #22c — Referral type mix on admits
  var refTypeAdmit = buildTopNTrended(admits, function(o){ return o.admit; }, function(o){ return o.ref; }, g, 5);

  // KPI strip
  var html = '<div class="kpis">';
  html += kpi('navy',  'Opps in Period', oppsP.length);
  html += kpi('blue',  'Admits in Period', admits.length, pct(admits.length, oppsP.length) + ' of opps');
  html += kpi('teal',  'Distinct Referral Sources', Object.keys(refTrend.series.reduce(function(s,x){ s[x.label]=1; return s; }, {})).length);
  html += kpi('amber', 'Period · Granularity', p + ' · ' + granLbl);
  html += '</div>';

  // #11 Top referral sources (all opps)
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Top 5 Referral Sources</div><div class="card-sub">' + granLbl + ' · all opps created · stacked area · ' + p + ' · ' + refTrend.total + ' opps</div></div></div><div class="chart-wrap-tall"><canvas id="ch-comp-ref"></canvas></div></div>';

  // #22 trio — composition on ADMITS
  html += '<div class="g2">';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Insurance Mix on Admits</div><div class="card-sub">' + granLbl + ' · top 5 stacked · ' + admits.length + ' admits · ' + p + '</div></div></div><div class="chart-wrap-tall"><canvas id="ch-comp-ins"></canvas></div></div>';
  html += '<div class="card"><div class="card-h"><div><div class="card-title">LOC Mix on Admits</div><div class="card-sub">' + granLbl + ' · level of care · top 5 stacked · ' + admits.length + ' admits · ' + p + '</div></div></div><div class="chart-wrap-tall"><canvas id="ch-comp-loc"></canvas></div></div>';
  html += '</div>';

  html += '<div class="card"><div class="card-h"><div><div class="card-title">Referral Type Mix on Admits</div><div class="card-sub">' + granLbl + ' · referral channel of admitted opps · top 5 stacked · ' + p + '</div></div></div><div class="chart-wrap-tall"><canvas id="ch-comp-ref-admits"></canvas></div></div>';

  // #23 Cost-per-Lead / Cost-per-Admit shell — no spend data yet
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Cost per Lead · Cost per Admit</div><div class="card-sub">By referral source · ' + p + '</div></div></div>';
  html += '<div class="empty" style="padding:32px 16px;text-align:center;color:var(--muted);font-size:13px">No marketing spend data connected yet.<br/><span style="font-size:11px;opacity:0.8">When a spend CSV or feed is wired in, this card will populate with $/lead and $/admit by source.</span></div>';
  html += '</div>';

  document.getElementById('tab-composition').innerHTML = html;

  // Generic stacked-area renderer for the four reason-style charts
  var palette = ['#0a3d5c','#3dffc0','#4BBDE8','#f59e0b','#8b5cf6','#94a3b8'];
  function stackedAreaCfg(t) {
    return {
      type:'line',
      data:{ labels: t.labels, datasets: t.series.map(function(s, i){
        return { label:s.label, data:s.data,
          borderColor: palette[i % palette.length],
          backgroundColor: palette[i % palette.length] + 'AA',
          fill:true, tension:0.3 };
      }) },
      options:{ responsive:true, maintainAspectRatio:false,
        scales:{ x:{ ticks:{font:{size:9},maxTicksLimit:12} }, y:{ stacked:true, beginAtZero:true, title:{display:true,text:'count'} } },
        plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:12}}, tooltip:{mode:'index',intersect:false} },
        elements:{ point:{radius:0} }
      }
    };
  }
  destroyChart('compRef');       CHARTS.compRef       = new Chart(document.getElementById('ch-comp-ref'),         stackedAreaCfg(refTrend));
  destroyChart('compIns');       CHARTS.compIns       = new Chart(document.getElementById('ch-comp-ins'),         stackedAreaCfg(insTrend));
  destroyChart('compLoc');       CHARTS.compLoc       = new Chart(document.getElementById('ch-comp-loc'),         stackedAreaCfg(locTrend));
  destroyChart('compRefAdmits'); CHARTS.compRefAdmits = new Chart(document.getElementById('ch-comp-ref-admits'),  stackedAreaCfg(refTypeAdmit));
}

// ── Initial render — gated by sign-in ─────────────────────────────────────
function bootstrapDashboard() {
  // Called by enterDashboard() once the user has authenticated against the
  // Provident tenant. Defers all data-bound rendering until then.
  buildOverview();
}
</script>
