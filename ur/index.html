<style>
:root{
  --navy:#0a3d5c; --sky:#4BBDE8; --teal:#3dffc0; --teal-dim:rgba(61,255,192,.2);
  --white:#fff; --border:#e2e8f0; --muted:#6b7e96; --text:#2D2D2D;
  --light:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#fff;color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-size:13px;line-height:1.45}

/* ── Header ── */
.app-header{background:var(--navy);color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.app-title{display:flex;align-items:center;gap:14px}
.brand-badge{background:var(--teal);color:var(--navy);padding:5px 11px;border-radius:5px;font-family:'Space Mono',monospace;font-weight:700;font-size:11px;letter-spacing:.1em}
.app-title h1{font-size:17px;font-weight:600;letter-spacing:.01em}
.app-title .sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.65);margin-top:2px;letter-spacing:.05em}
.app-meta{display:flex;align-items:center;gap:14px;font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.75)}
.app-meta .live{display:inline-flex;align-items:center;gap:5px;color:var(--teal)}
.app-meta .live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 3px rgba(61,255,192,.2)}
.refresh-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:4px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;font-weight:700;letter-spacing:.05em}
.refresh-btn:hover{background:rgba(255,255,255,.18)}

/* ── Tab nav ── */
.tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:0;overflow-x:auto;position:sticky;top:60px;z-index:180;flex-wrap:wrap}
.tnav{background:none;border:none;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;letter-spacing:.01em;white-space:nowrap;transition:all .15s}
.tnav:hover{color:var(--navy)}
.tnav.active{color:var(--navy);border-bottom-color:var(--teal)}

/* ── App body: filter rail + content ── */
.app-body{display:flex;align-items:flex-start;min-height:calc(100vh - 104px)}
.filters{width:210px;min-width:210px;flex-shrink:0;display:flex;flex-direction:column;padding:0;background:var(--white);border-right:1px solid var(--border);position:sticky;top:104px;height:calc(100vh - 104px);overflow-y:auto;z-index:100}
.filters-inner{padding:14px 14px 20px;display:flex;flex-direction:column;gap:0}
.filt-grp{display:flex;flex-direction:column;gap:6px;padding:12px 0;border-bottom:1px solid var(--border)}
.filt-grp:last-child{border-bottom:none}
.filt-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:2px}
.filt-btn{padding:6px 10px;border:1px solid var(--border);background:#fff;border-radius:5px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.04em;transition:all .15s;text-align:left;width:100%}
.filt-btn:hover{background:rgba(10,61,92,.07);color:var(--navy)}
.filt-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.filt-sel{padding:6px 8px;border:1px solid var(--border);background:#fff;border-radius:5px;font-family:'Space Mono',monospace;font-size:11px;color:var(--navy);outline:none;width:100%}
.filt-sel:focus{border-color:var(--navy)}

.tab-content{flex:1;min-width:0;padding:22px 24px}
.tab-panel{display:none}.tab-panel.active{display:block}

@media(max-width:768px){
  .app-body{flex-direction:column}
  .filters{width:100%;min-width:0;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border)}
  .filters-inner{flex-direction:row;flex-wrap:wrap;gap:8px;padding:12px 16px}
  .filt-grp{border-bottom:none;border-right:1px solid var(--border);padding:0 12px;flex-direction:row;align-items:center;gap:5px;flex-wrap:wrap}
  .filt-grp:last-child{border-right:none}
  .filt-btn{width:auto}.filt-sel{width:auto;min-width:120px}
  .tab-content{padding:14px 16px}
}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--border);border-left:4px solid var(--navy);border-radius:7px;padding:11px 14px}
.kpi.b-navy{border-left-color:var(--navy)}.kpi.b-sky{border-left-color:var(--sky)}.kpi.b-teal{border-left-color:var(--teal)}
.kpi.b-amber{border-left-color:#f59e0b}.kpi.b-red{border-left-color:#ef4444}.kpi.b-green{border-left-color:#10b981}
.kpi .lbl{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.kpi .val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--navy);margin-top:4px;line-height:1}
.kpi .sub{font-size:10.5px;color:var(--muted);margin-top:3px}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px}
.card-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:12px}
.card-title{font-size:14px;font-weight:600;color:var(--navy)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#f8fafc;padding:7px 8px;text-align:left;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.05em;color:var(--muted);font-weight:700;text-transform:uppercase;border-bottom:2px solid var(--border)}
.tbl td{padding:7px 8px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:#f8fafc}
.tbl .num{text-align:right;font-family:'Space Mono',monospace}
.tbl .empty{text-align:center;color:var(--muted);font-style:italic;padding:18px}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.03em}
.b-blue{background:#dbeafe;color:#1e40af}
.b-amber{background:#fef3c7;color:#92400e}
.b-red{background:#fee2e2;color:#991b1b}
.b-green{background:#d1fae5;color:#065f46}
.b-grey{background:#f1f5f9;color:#64748b}

/* ── Roadmap data-pending styling ── */
.roadmap-item{padding:12px 14px;margin-bottom:8px;background:#fffaf0;border:1px solid #fde68a;border-left:4px solid #f59e0b;border-radius:6px}
.roadmap-item .rh{font-weight:600;color:var(--navy);margin-bottom:3px;font-size:13px}
.roadmap-item .rsub{font-size:11px;color:var(--muted);margin-bottom:5px}
.roadmap-item .rneed{font-size:11px;color:#92400e;font-family:'Space Mono',monospace}
</style>
</head>

var FILTERS = { facility: '', insurance: '', reviewer: '' };

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s){ if(s==null) return ''; return String(s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]}); }
function pd(s){ if(!s) return null; var d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
function fmt(d){ if(!d) return ''; return (d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2); }
function todayD(){ var d=new Date(); d.setHours(0,0,0,0); return d; }

function filteredAuths(){
  return AUTHS.filter(function(a){
    if (FILTERS.facility && a.facility !== FILTERS.facility) return false;
    if (FILTERS.insurance && a.ins !== FILTERS.insurance) return false;
    if (FILTERS.reviewer && a.reviewer !== FILTERS.reviewer) return false;
    return true;
  });
}
function filteredCensus(){
  return CENSUS.filter(function(c){
    if (FILTERS.insurance && c.ins !== FILTERS.insurance) return false;
    return true;
  });
}

// Coverage status for a patient based on next_review_date
function coverageStatus(nrd){
  if (!nrd) return { cls: 'b-grey', lbl: 'NO REVIEW DATE' };
  var d = pd(nrd); if (!d) return { cls:'b-grey', lbl:'INVALID' };
  var today = todayD();
  var daysUntil = Math.floor((d - today) / 86400000);
  if (daysUntil < 0)  return { cls: 'b-red',   lbl: 'EXPIRED ' + Math.abs(daysUntil) + 'd' };
  if (daysUntil <= 3) return { cls: 'b-amber', lbl: 'EXPIRING ' + daysUntil + 'd' };
  return { cls: 'b-green', lbl: 'COVERED ' + daysUntil + 'd' };
}

function kpi(cls, lbl, val, sub){
  return '<div class="kpi b-'+cls+'"><div class="lbl">'+esc(lbl)+'</div><div class="val">'+esc(val)+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>';
}

// Populate insurance + reviewer dropdowns
function populateFilters(){
  var insSet = {}, revSet = {};
  AUTHS.forEach(function(a){ if(a.ins) insSet[a.ins]=true; if(a.reviewer) revSet[a.reviewer]=true; });
  var insSel = document.getElementById('insSel');
  var revSel = document.getElementById('revSel');
  Object.keys(insSet).sort().forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=k; insSel.appendChild(o); });
  Object.keys(revSet).sort().forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=k; revSel.appendChild(o); });
}

// ── Tab: Overview ─────────────────────────────────────────────────────────
function buildOverview(){
  var auths = filteredAuths();
  var census = filteredCensus();
  var today = todayD();

  // Active auths = entries in Report Auth with admission_date in past and no clear discharge signal
  var activeAuths = auths;
  // Pending reviews = next 7 days
  var pendingReviews = auths.filter(function(a){
    var d = pd(a.nrd); if (!d) return false;
    var days = Math.floor((d - today) / 86400000);
    return days >= 0 && days <= 7;
  });
  // At-risk = next_review_date in past AND patient still in census
  var censusNames = {};
  census.forEach(function(c){ if (c.patient) censusNames[c.patient.toLowerCase()] = true; });
  var atRisk = auths.filter(function(a){
    if (!a.nrd) return false;
    var d = pd(a.nrd); if (!d || d >= today) return false;
    return a.patient && censusNames[a.patient.toLowerCase()];
  });

  // Days-at-Risk $$ estimate — $1500/day default; refine when LOC rate table available
  var DAILY_RATE_DEFAULT = 1500;
  var atRiskDays = atRisk.reduce(function(sum, a){
    var d = pd(a.nrd); if (!d) return sum;
    return sum + Math.max(0, Math.floor((today - d) / 86400000));
  }, 0);
  var atRiskDollars = atRiskDays * DAILY_RATE_DEFAULT;
  var dollarsFmt = '$' + atRiskDollars.toLocaleString();

  // Reviewer workload
  var byReviewer = {};
  auths.forEach(function(a){ if(a.reviewer) byReviewer[a.reviewer] = (byReviewer[a.reviewer]||0)+1; });
  var topReviewer = Object.keys(byReviewer).sort(function(a,b){return byReviewer[b]-byReviewer[a]})[0] || '—';

  var html = '<div class="kpis">';
  html += kpi('navy',  'Active Authorizations', activeAuths.length);
  html += kpi('sky',   'Pending Reviews (7d)',  pendingReviews.length);
  html += kpi('red',   'At-Risk Patients',      atRisk.length, atRiskDays + ' days past review');
  html += kpi('red',   'Est. Revenue Exposure', dollarsFmt, '@ $1,500/day default');
  html += kpi('teal',  'Top Reviewer Load',     topReviewer, byReviewer[topReviewer] ? byReviewer[topReviewer] + ' patients' : '');
  html += kpi('amber', 'Total Census',          census.length, 'active patients');
  html += '</div>';

  // Upcoming Reviews 7-day table
  pendingReviews.sort(function(a,b){ return pd(a.nrd) - pd(b.nrd); });
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Upcoming Reviews — Next 7 Days ('+pendingReviews.length+')</div><div class="card-sub">Sorted by review date · operational triage</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Patient</th><th>Facility</th><th>Insurance</th><th>Reviewer</th><th>Review Date</th><th class="num">Days Until</th><th class="num">Auth Units</th><th class="num">Billed</th></tr></thead><tbody>';
  if (!pendingReviews.length){
    html += '<tr><td colspan="8" class="empty">No reviews due in the next 7 days.</td></tr>';
  } else {
    pendingReviews.forEach(function(a){
      var d = pd(a.nrd);
      var days = Math.floor((d - today) / 86400000);
      var cls = days <= 1 ? 'b-red' : (days <= 3 ? 'b-amber' : 'b-blue');
      html += '<tr><td>'+esc(a.patient)+'</td><td>'+esc(a.facility)+'</td><td>'+esc(a.ins)+'</td><td>'+esc(a.reviewer)+'</td><td>'+fmt(d)+'</td><td class="num"><span class="badge '+cls+'">'+days+'d</span></td><td class="num">'+a.au+'</td><td class="num">'+a.bu+'</td></tr>';
    });
  }
  html += '</tbody></table></div></div>';

  // At-Risk Patients (review past + still active)
  atRisk.sort(function(a,b){ return pd(a.nrd) - pd(b.nrd); });
  html += '<div class="card"><div class="card-h"><div><div class="card-title">At-Risk Patients ('+atRisk.length+')</div><div class="card-sub">Review date past, patient still in census · '+atRiskDays+' total at-risk days · est. $'+atRiskDollars.toLocaleString()+' exposure</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Patient</th><th>Facility</th><th>Insurance</th><th>Reviewer</th><th>Review Was Due</th><th class="num">Days Past</th><th class="num">Est. Exposure</th></tr></thead><tbody>';
  if (!atRisk.length){
    html += '<tr><td colspan="7" class="empty">No at-risk patients. Coverage is current.</td></tr>';
  } else {
    atRisk.forEach(function(a){
      var d = pd(a.nrd);
      var days = Math.floor((today - d) / 86400000);
      var dollars = days * DAILY_RATE_DEFAULT;
      html += '<tr><td>'+esc(a.patient)+'</td><td>'+esc(a.facility)+'</td><td>'+esc(a.ins)+'</td><td>'+esc(a.reviewer)+'</td><td>'+fmt(d)+'</td><td class="num"><span class="badge b-red">'+days+'d</span></td><td class="num">$'+dollars.toLocaleString()+'</td></tr>';
    });
  }
  html += '</tbody></table></div></div>';

  document.getElementById('tab-overview').innerHTML = html;
}

// ── Tab: Coverage & Utilization ───────────────────────────────────────────
function buildCoverage(){
  var auths = filteredAuths();
  var today = todayD();

  // Utilization rate: avg billed/authorized across the population
  var withUtil = auths.filter(function(a){ return a.au > 0; });
  var avgUtil = withUtil.length ? (withUtil.reduce(function(s,a){return s+(a.bu/a.au);},0) / withUtil.length * 100) : 0;
  var overUtil = withUtil.filter(function(a){ return a.bu > a.au; }).length;
  var underUtil = withUtil.filter(function(a){ return a.au > 0 && (a.bu / a.au) < 0.5; }).length;

  var html = '<div class="kpis">';
  html += kpi('navy',  'Avg Utilization', avgUtil.toFixed(1) + '%', 'billed ÷ authorized');
  html += kpi('red',   'Over-Utilized',   overUtil, 'patients billed > authorized');
  html += kpi('amber', 'Under-Utilized',  underUtil, '<50% of authorized used');
  html += kpi('sky',   'Total Auths',     auths.length);
  html += '</div>';

  // Coverage Status Roster — every auth with status badge
  var roster = auths.slice().sort(function(a,b){
    var da = pd(a.nrd), db = pd(b.nrd);
    if (!da) return 1; if (!db) return -1;
    return da - db;
  });
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Coverage Status Roster ('+roster.length+')</div><div class="card-sub">All active authorizations sorted by next review date · color-coded by urgency</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Patient</th><th>Facility</th><th>Insurance</th><th>Reviewer</th><th>Admit</th><th>Next Review</th><th>Status</th><th class="num">Auth</th><th class="num">Billed</th><th class="num">Util %</th></tr></thead><tbody>';
  if (!roster.length){
    html += '<tr><td colspan="10" class="empty">No authorizations match current filters.</td></tr>';
  } else {
    roster.slice(0, 200).forEach(function(a){
      var st = coverageStatus(a.nrd);
      var utilCls = a.util==null ? 'b-grey' : (a.util > 100 ? 'b-red' : (a.util < 50 ? 'b-amber' : 'b-green'));
      var utilLbl = a.util==null ? '—' : a.util.toFixed(1) + '%';
      html += '<tr><td>'+esc(a.patient)+'</td><td style="font-size:11px">'+esc(a.facility)+'</td><td style="font-size:11px">'+esc(a.ins)+'</td><td style="font-size:11px">'+esc(a.reviewer)+'</td><td style="font-family:Space Mono,monospace;font-size:11px">'+fmt(pd(a.adm))+'</td><td style="font-family:Space Mono,monospace;font-size:11px">'+fmt(pd(a.nrd))+'</td><td><span class="badge '+st.cls+'">'+st.lbl+'</span></td><td class="num">'+a.au+'</td><td class="num">'+a.bu+'</td><td class="num"><span class="badge '+utilCls+'">'+utilLbl+'</span></td></tr>';
    });
    if (roster.length > 200){
      html += '<tr><td colspan="10" class="empty">Showing 200 of '+roster.length+' — refine filters to narrow.</td></tr>';
    }
  }
  html += '</tbody></table></div></div>';

  // LOC step-down tracking via Census join
  var locCounts = {};
  CENSUS.forEach(function(c){ if(c.loc) locCounts[c.loc] = (locCounts[c.loc]||0)+1; });
  var locArr = Object.keys(locCounts).map(function(k){ return [k, locCounts[k]]; }).sort(function(a,b){return b[1]-a[1]});
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Census by Level of Care</div><div class="card-sub">Current active patients — auth coverage check should track step-downs</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Level of Care</th><th class="num">Active Patients</th><th class="num">% of Census</th></tr></thead><tbody>';
  if (!locArr.length){
    html += '<tr><td colspan="3" class="empty">No census data.</td></tr>';
  } else {
    var totalCensus = locArr.reduce(function(s,r){return s+r[1]},0);
    locArr.forEach(function(r){
      html += '<tr><td>'+esc(r[0])+'</td><td class="num">'+r[1]+'</td><td class="num">'+(r[1]/totalCensus*100).toFixed(1)+'%</td></tr>';
    });
  }
  html += '</tbody></table></div></div>';

  document.getElementById('tab-coverage').innerHTML = html;
}

// ── Tab: Reviewer & Payer ─────────────────────────────────────────────────
function buildReviewer(){
  var auths = filteredAuths();

  // By Reviewer
  var byRev = {};
  auths.forEach(function(a){
    var k = a.reviewer || '(unassigned)';
    if (!byRev[k]) byRev[k] = { patients:0, totalAu:0, totalBu:0, payers:{} };
    byRev[k].patients++;
    byRev[k].totalAu += a.au;
    byRev[k].totalBu += a.bu;
    if (a.ins) byRev[k].payers[a.ins] = true;
  });
  var revRows = Object.keys(byRev).map(function(k){
    var r = byRev[k];
    return { name:k, patients:r.patients, au:r.totalAu, bu:r.totalBu, util:r.totalAu>0?(r.totalBu/r.totalAu*100):0, payers:Object.keys(r.payers).length };
  }).sort(function(a,b){ return b.patients - a.patients });

  var totalPatients = auths.length;
  var avgLoad = revRows.length ? (totalPatients / revRows.length) : 0;

  var html = '<div class="kpis">';
  html += kpi('navy', 'Active Reviewers', revRows.length);
  html += kpi('sky',  'Avg Workload',     avgLoad.toFixed(1), 'patients per reviewer');
  html += kpi('teal', 'Top Load',         revRows[0]?revRows[0].patients:0, revRows[0]?revRows[0].name:'');
  html += '</div>';

  html += '<div class="card"><div class="card-h"><div><div class="card-title">By Reviewer</div><div class="card-sub">Patient count, authorized units, billed units, utilization, payer diversity</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Reviewer</th><th class="num">Patients</th><th class="num">Total Auth</th><th class="num">Total Billed</th><th class="num">Util %</th><th class="num">Payers</th><th class="num">Load Variance</th></tr></thead><tbody>';
  if (!revRows.length){
    html += '<tr><td colspan="7" class="empty">No reviewer data.</td></tr>';
  } else {
    revRows.forEach(function(r){
      var variance = r.patients - avgLoad;
      var varCls = Math.abs(variance) > avgLoad*0.5 ? 'b-amber' : 'b-grey';
      var varLbl = (variance>0?'+':'')+variance.toFixed(1);
      var utilCls = r.util > 100 ? 'b-red' : (r.util < 50 ? 'b-amber' : 'b-green');
      html += '<tr><td>'+esc(r.name)+'</td><td class="num">'+r.patients+'</td><td class="num">'+r.au.toFixed(1)+'</td><td class="num">'+r.bu.toFixed(1)+'</td><td class="num"><span class="badge '+utilCls+'">'+r.util.toFixed(1)+'%</span></td><td class="num">'+r.payers+'</td><td class="num"><span class="badge '+varCls+'">'+varLbl+'</span></td></tr>';
    });
  }
  html += '</tbody></table></div></div>';

  // By Payer
  var byPayer = {};
  auths.forEach(function(a){
    var k = a.ins || '(unspecified)';
    if (!byPayer[k]) byPayer[k] = { patients:0, totalAu:0, totalBu:0, facilities:{} };
    byPayer[k].patients++;
    byPayer[k].totalAu += a.au;
    byPayer[k].totalBu += a.bu;
    if (a.facility) byPayer[k].facilities[a.facility] = true;
  });
  var payerRows = Object.keys(byPayer).map(function(k){
    var r = byPayer[k];
    return { name:k, patients:r.patients, au:r.totalAu, bu:r.totalBu, util:r.totalAu>0?(r.totalBu/r.totalAu*100):0, facilities:Object.keys(r.facilities).length };
  }).sort(function(a,b){ return b.patients - a.patients });

  html += '<div class="card"><div class="card-h"><div><div class="card-title">By Payer</div><div class="card-sub">Patient count, authorized units, billed units, utilization</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Insurance</th><th class="num">Patients</th><th class="num">Total Auth</th><th class="num">Total Billed</th><th class="num">Util %</th><th class="num">Facilities</th></tr></thead><tbody>';
  if (!payerRows.length){
    html += '<tr><td colspan="6" class="empty">No payer data.</td></tr>';
  } else {
    payerRows.forEach(function(r){
      var utilCls = r.util > 100 ? 'b-red' : (r.util < 50 ? 'b-amber' : 'b-green');
      html += '<tr><td>'+esc(r.name)+'</td><td class="num">'+r.patients+'</td><td class="num">'+r.au.toFixed(1)+'</td><td class="num">'+r.bu.toFixed(1)+'</td><td class="num"><span class="badge '+utilCls+'">'+r.util.toFixed(1)+'%</span></td><td class="num">'+r.facilities+'</td></tr>';
    });
  }
  html += '</tbody></table></div></div>';

  document.getElementById('tab-reviewer').innerHTML = html;
}

// ── Tab: Roadmap (Wave 2 — awaiting data) ─────────────────────────────────
function buildRoadmap(){
  var items = [
    { h:'Approval Rate trended', sub:'Overall + by review type (initial/concurrent/discharge)', need:'Needs Sunwave field: approval_status (Approved/Denied/Pending)' },
    { h:'First-Pass Approval Rate', sub:'% approved without peer-to-peer', need:'Needs Sunwave flag: required_p2p (yes/no)' },
    { h:'Days Approved ÷ Days Requested ratio', sub:'Negotiation effectiveness', need:'Needs Sunwave field: days_requested (currently only authorized_units captured)' },
    { h:'Denial Rate + Reasons Pareto + trended', sub:'Top denial reasons over time', need:'Needs Sunwave field: denial_reason (coded list, not free text)' },
    { h:'Peer-to-Peer outcomes', sub:'Count + success rate + by reviewer', need:'Needs Sunwave fields: p2p_date, p2p_outcome (Approved/Denied)' },
    { h:'Appeal volume + success rate', sub:'Recovery mechanism by appeal level', need:'Needs Sunwave fields: appeal_filed, appeal_level, appeal_outcome' },
    { h:'Avg time-to-resolution on denials', sub:'How long denials sit unresolved', need:'Needs Sunwave fields: denial_date, resolution_date' },
    { h:'Days-to-Decision by payer', sub:'How fast each insurer responds', need:'Needs Sunwave field: decision_date (vs submission_date)' },
    { h:'Cohort retention on auth', sub:'% authorized at day 7/14/30', need:'Available NOW from existing data — to be built in v1.1' },
    { h:'Hour×Day submission heatmap', sub:'Workload smoothing insight', need:'Needs Sunwave field: submission_timestamp on each auth' },
  ];

  var html = '<div class="card"><div class="card-h"><div><div class="card-title">📋 Roadmap — Metrics Awaiting Data</div><div class="card-sub">Each item below was approved in the metric design but needs a data field that does not yet flow from Sunwave. Two paths to unlock: (1) add custom fields in Sunwave + train UR team to fill them, or (2) maintain a manual companion log that joins to Report Auth.</div></div></div>';
  items.forEach(function(it){
    html += '<div class="roadmap-item"><div class="rh">'+esc(it.h)+'</div><div class="rsub">'+esc(it.sub)+'</div><div class="rneed">⚠ '+esc(it.need)+'</div></div>';
  });
  html += '</div>';

  // Data-source summary
  html += '<div class="card"><div class="card-h"><div><div class="card-title">Current UR Data Sources</div><div class="card-sub">What flows from the Sunwave xlsx today</div></div></div>';
  html += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Sheet</th><th>Rows</th><th>Used For</th></tr></thead><tbody>';
  html += '<tr><td><strong>Report Auth</strong></td><td>'+AUTHS.length+'</td><td>Patient, admission_date, next_review_date, authorized_units, billed_units_total, insurance_provider, ur_reviewer, service_facility, authorization_code</td></tr>';
  html += '<tr><td><strong>Census_Admitted</strong></td><td>'+CENSUS.length+'</td><td>Active patient roster — joined for at-risk detection</td></tr>';
  html += '<tr><td><strong>GroupNotes</strong></td><td>'+GROUPNOTES.length+'</td><td>Session attendance — to be cross-referenced with upcoming reviews in v1.1</td></tr>';
  html += '<tr><td>Report UR Changes</td><td>—</td><td>UNTAPPED — review change history (worth processing in v1.1)</td></tr>';
  html += '</tbody></table></div></div>';

  document.getElementById('tab-roadmap').innerHTML = html;
}

// ── Tab navigation ────────────────────────────────────────────────────────
function activateTab(n){
  document.querySelectorAll('.tnav').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === n); });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.toggle('active', p.id === 'tab-'+n); });
  if      (n === 'overview') buildOverview();
  else if (n === 'coverage') buildCoverage();
  else if (n === 'reviewer') buildReviewer();
  else if (n === 'roadmap')  buildRoadmap();
}

function rebuildAll(){
  var activeTab = document.querySelector('.tnav.active').dataset.tab;
  activateTab(activeTab);
}

// ── Wire up ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tnav').forEach(function(b){
  b.onclick = function(){ activateTab(b.dataset.tab); };
});
document.querySelectorAll('.filt-btn[data-fac]').forEach(function(b){
  b.onclick = function(){
    document.querySelectorAll('.filt-btn[data-fac]').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active'); FILTERS.facility = b.dataset.fac; rebuildAll();
  };
});
document.getElementById('insSel').onchange = function(){ FILTERS.insurance = this.value; rebuildAll(); };
document.getElementById('revSel').onchange = function(){ FILTERS.reviewer  = this.value; rebuildAll(); };

// Synced timestamp
if (META.refreshed_human){
  document.getElementById('syncedTs').textContent = 'Synced: ' + META.refreshed_human;
}

// Initial render
populateFilters();
buildOverview();
</script>
